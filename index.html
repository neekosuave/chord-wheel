<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Chord Wheel</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .card {
      background: #222;
      max-width: 650px;
      margin: auto;
      padding: 25px;
      border-radius: 20px;
    }

    select, button, input {
      font-size: 16px;
      padding: 12px;
      margin: 6px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: #444;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #666;
    }

    button.active {
      background: white;
      color: black;
    }

    .random-btn {
      background: #d4af37;
      color: #111;
      font-weight: bold;
    }

    .play-btn {
      background: #2ecc71;
      color: #111;
      font-weight: bold;
    }

    .copy-btn {
      background: #3498db;
      color: white;
      font-weight: bold;
    }

    .midi-btn {
      background: #9b59b6;
      color: white;
      font-weight: bold;
    }

    .stop-btn {
      background: #e74c3c;
      color: white;
      font-weight: bold;
    }

    .box {
      background: #333;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }

    .progression {
      background: #111;
      padding: 15px;
      margin: 12px 0;
      border-radius: 10px;
    }

    .small {
      font-size: 14px;
      color: #ccc;
    }

    .copied {
      color: #2ecc71;
      font-size: 14px;
      margin-top: 6px;
      min-height: 18px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>My Chord Wheel</h1>
    <p>Choose major or minor, pick a key, then preview, copy, or download MIDI.</p>

    <button id="majorBtn" class="active" onclick="setMode('major')">Major</button>
    <button id="minorBtn" onclick="setMode('minor')">Minor</button>

    <br>

    <select id="keyPicker" onchange="showChords()"></select>

    <br>

    <label>Tempo:</label>
    <input id="tempoPicker" type="number" value="86" min="40" max="180">

    <br>

    <button class="random-btn" onclick="randomizeProgressions()">Randomize Progressions</button>
    <button class="stop-btn" onclick="stopPlayback()">Stop</button>

    <div class="box">
      <h2 id="keyTitle">C Major</h2>

      <h3>Chords in Key</h3>
      <p id="chordOutput">C – Dm – Em – F – G – Am – Bdim</p>

      <h3>Random R&B Progressions</h3>
      <p class="small">Copy gives you chord names. Download MIDI gives you a file for your DAW.</p>
      <div id="progressionOutput"></div>
    </div>
  </div>

  <script>
    const majorKeys = {
      "C": ["C", "Dm", "Em", "F", "G", "Am", "Bdim"],
      "G": ["G", "Am", "Bm", "C", "D", "Em", "F#dim"],
      "D": ["D", "Em", "F#m", "G", "A", "Bm", "C#dim"],
      "A": ["A", "Bm", "C#m", "D", "E", "F#m", "G#dim"],
      "E": ["E", "F#m", "G#m", "A", "B", "C#m", "D#dim"],
      "B": ["B", "C#m", "D#m", "E", "F#", "G#m", "A#dim"],
      "F#": ["F#", "G#m", "A#m", "B", "C#", "D#m", "E#dim"],
      "Db": ["Db", "Ebm", "Fm", "Gb", "Ab", "Bbm", "Cdim"],
      "Ab": ["Ab", "Bbm", "Cm", "Db", "Eb", "Fm", "Gdim"],
      "Eb": ["Eb", "Fm", "Gm", "Ab", "Bb", "Cm", "Ddim"],
      "Bb": ["Bb", "Cm", "Dm", "Eb", "F", "Gm", "Adim"],
      "F": ["F", "Gm", "Am", "Bb", "C", "Dm", "Edim"]
    };

    const minorKeys = {
      "Am": ["Am", "Bdim", "C", "Dm", "Em", "F", "G"],
      "Em": ["Em", "F#dim", "G", "Am", "Bm", "C", "D"],
      "Bm": ["Bm", "C#dim", "D", "Em", "F#m", "G", "A"],
      "F#m": ["F#m", "G#dim", "A", "Bm", "C#m", "D", "E"],
      "C#m": ["C#m", "D#dim", "E", "F#m", "G#m", "A", "B"],
      "G#m": ["G#m", "A#dim", "B", "C#m", "D#m", "E", "F#"],
      "D#m": ["D#m", "E#dim", "F#", "G#m", "A#m", "B", "C#"],
      "Bbm": ["Bbm", "Cdim", "Db", "Ebm", "Fm", "Gb", "Ab"],
      "Fm": ["Fm", "Gdim", "Ab", "Bbm", "Cm", "Db", "Eb"],
      "Cm": ["Cm", "Ddim", "Eb", "Fm", "Gm", "Ab", "Bb"],
      "Gm": ["Gm", "Adim", "Bb", "Cm", "Dm", "Eb", "F"],
      "Dm": ["Dm", "Edim", "F", "Gm", "Am", "Bb", "C"]
    };

    let mode = "major";
    let currentDisplayedProgressions = [];
    let audioContext = null;
    let activeOscillators = [];

    function setMode(newMode) {
      mode = newMode;

      document.getElementById("majorBtn").classList.toggle("active", mode === "major");
      document.getElementById("minorBtn").classList.toggle("active", mode === "minor");

      loadKeys();
      showChords();
    }

    function loadKeys() {
      const keyPicker = document.getElementById("keyPicker");
      keyPicker.innerHTML = "";

      const keys = mode === "major" ? Object.keys(majorKeys) : Object.keys(minorKeys);

      keys.forEach(function(key) {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = mode === "major" ? key + " Major" : key + " Minor";
        keyPicker.appendChild(option);
      });
    }

    function showChords() {
      const selectedKey = document.getElementById("keyPicker").value;
      const chords = mode === "major" ? majorKeys[selectedKey] : minorKeys[selectedKey];

      document.getElementById("keyTitle").textContent =
        mode === "major" ? selectedKey + " Major" : selectedKey + " Minor";

      document.getElementById("chordOutput").textContent = chords.join(" – ");

      randomizeProgressions();
    }

    function getProgressionIdeas(chords) {
      if (mode === "major") {
        return [
          {
            name: "Smooth R&B: vi – IV – I – V",
            chords: [chords[5], chords[3], chords[0], chords[4]]
          },
          {
            name: "Classic Soul: ii – V – I",
            chords: [chords[1], chords[4], chords[0]]
          },
          {
            name: "Emotional: I – iii – IV – V",
            chords: [chords[0], chords[2], chords[3], chords[4]]
          },
          {
            name: "Late Night: vi – ii – V – I",
            chords: [chords[5], chords[1], chords[4], chords[0]]
          },
          {
            name: "Dreamy: IV – I – V – vi",
            chords: [chords[3], chords[0], chords[4], chords[5]]
          },
          {
            name: "Gospel Lift: I – IV – ii – V",
            chords: [chords[0], chords[3], chords[1], chords[4]]
          },
          {
            name: "Pop R&B: I – V – vi – IV",
            chords: [chords[0], chords[4], chords[5], chords[3]]
          },
          {
            name: "Floating: iii – vi – ii – V",
            chords: [chords[2], chords[5], chords[1], chords[4]]
          }
        ];
      } else {
        return [
          {
            name: "Dark R&B: i – VI – III – VII",
            chords: [chords[0], chords[5], chords[2], chords[6]]
          },
          {
            name: "Trap Soul: i – VII – VI – VII",
            chords: [chords[0], chords[6], chords[5], chords[6]]
          },
          {
            name: "Late Night: i – iv – VII – III",
            chords: [chords[0], chords[3], chords[6], chords[2]]
          },
          {
            name: "Sad R&B: i – VI – iv – V",
            chords: [chords[0], chords[5], chords[3], chords[4]]
          },
          {
            name: "Moody: i – iv – VI – V",
            chords: [chords[0], chords[3], chords[5], chords[4]]
          },
          {
            name: "Toxic R&B: i – VII – iv – VI",
            chords: [chords[0], chords[6], chords[3], chords[5]]
          },
          {
            name: "Brent Style: i – VI – VII – i",
            chords: [chords[0], chords[5], chords[6], chords[0]]
          },
          {
            name: "Smooth Minor: i – iv – v – VI",
            chords: [chords[0], chords[3], chords[4], chords[5]]
          }
        ];
      }
    }

    function randomizeProgressions() {
      const selectedKey = document.getElementById("keyPicker").value;
      const chords = mode === "major" ? majorKeys[selectedKey] : minorKeys[selectedKey];

      const allProgressions = getProgressionIdeas(chords);

      const shuffled = allProgressions.sort(function() {
        return Math.random() - 0.5;
      });

      currentDisplayedProgressions = shuffled.slice(0, 3);

      let output = "";

      currentDisplayedProgressions.forEach(function(item, index) {
        output += "<div class='progression'>";
        output += "<strong>" + item.name + "</strong><br>";
        output += item.chords.join(" – ");
        output += "<br><br>";
        output += "<button class='play-btn' onclick='playProgression(" + index + ")'>Play</button>";
        output += "<button class='copy-btn' onclick='copyProgression(" + index + ")'>Copy</button>";
        output += "<button class='midi-btn' onclick='downloadMidi(" + index + ")'>Download MIDI</button>";
        output += "<div class='copied' id='copyStatus" + index + "'></div>";
        output += "</div>";
      });

      document.getElementById("progressionOutput").innerHTML = output;
    }

    function copyProgression(index) {
      const item = currentDisplayedProgressions[index];
      const textToCopy = item.name + "\\n" + item.chords.join(" - ");

      navigator.clipboard.writeText(textToCopy).then(function() {
        document.getElementById("copyStatus" + index).textContent = "Copied!";
        setTimeout(function() {
          document.getElementById("copyStatus" + index).textContent = "";
        }, 1500);
      });
    }

    function getAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioContext;
    }

    function stopPlayback() {
      activeOscillators.forEach(function(osc) {
        try {
          osc.stop();
        } catch (error) {}
      });

      activeOscillators = [];
    }

    function playProgression(index) {
      stopPlayback();

      const ctx = getAudioContext();

      if (ctx.state === "suspended") {
        ctx.resume();
      }

      const progression = currentDisplayedProgressions[index].chords;
      const bpm = Number(document.getElementById("tempoPicker").value) || 86;

      const secondsPerChord = (60 / bpm) * 2;

      progression.forEach(function(chordName, chordIndex) {
        const startTime = ctx.currentTime + chordIndex * secondsPerChord;
        playChord(chordName, startTime, secondsPerChord);
      });
    }

    function playChord(chordName, startTime, duration) {
      const ctx = getAudioContext();

      const midiNotes = getChordMidiNotes(chordName);

      midiNotes.forEach(function(midiNote) {
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.value = midiToFrequency(midiNote);

        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(0.12, startTime + 0.05);
        gain.gain.setValueAtTime(0.12, startTime + duration - 0.15);
        gain.gain.linearRampToValueAtTime(0, startTime + duration);

        oscillator.connect(gain);
        gain.connect(ctx.destination);

        oscillator.start(startTime);
        oscillator.stop(startTime + duration + 0.1);

        activeOscillators.push(oscillator);
      });
    }

    function getChordMidiNotes(chordName) {
      let root = chordName;
      let quality = "major";

      if (chordName.endsWith("dim")) {
        root = chordName.replace("dim", "");
        quality = "dim";
      } else if (chordName.endsWith("m")) {
        root = chordName.slice(0, -1);
        quality = "minor";
      }

      const rootMidi = noteToMidi(root);

      let intervals = [];

      if (quality === "major") {
        intervals = [0, 4, 7];
      } else if (quality === "minor") {
        intervals = [0, 3, 7];
      } else if (quality === "dim") {
        intervals = [0, 3, 6];
      }

      // Adds bass note one octave lower plus the regular triad
      return [rootMidi - 12].concat(intervals.map(function(interval) {
        return rootMidi + interval;
      }));
    }

    function noteToMidi(noteName) {
      const noteMap = {
        "C": 60,
        "C#": 61,
        "Db": 61,
        "D": 62,
        "D#": 63,
        "Eb": 63,
        "E": 64,
        "E#": 65,
        "Fb": 64,
        "F": 65,
        "F#": 66,
        "Gb": 66,
        "G": 67,
        "G#": 68,
        "Ab": 68,
        "A": 69,
        "A#": 70,
        "Bb": 70,
        "B": 71,
        "Cb": 59
      };

      return noteMap[noteName] || 60;
    }

    function midiToFrequency(midiNote) {
      return 440 * Math.pow(2, (midiNote - 69) / 12);
    }

    function downloadMidi(index) {
      const item = currentDisplayedProgressions[index];
      const bpm = Number(document.getElementById("tempoPicker").value) || 86;

      const midiData = createMidiFile(item.chords, bpm);
      const blob = new Blob([new Uint8Array(midiData)], { type: "audio/midi" });

      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);

      const selectedKey = document.getElementById("keyPicker").value;
      const cleanName = sanitizeFileName(selectedKey + "-" + item.name);

      link.download = cleanName + ".mid";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function sanitizeFileName(name) {
      return name
        .replace(/[^a-z0-9]/gi, "-")
        .replace(/-+/g, "-")
        .toLowerCase();
    }

    function createMidiFile(chords, bpm) {
      const ticksPerBeat = 480;
      const beatsPerChord = 2;
      const chordDurationTicks = ticksPerBeat * beatsPerChord;

      let track = [];

      // Tempo event
      const microsecondsPerBeat = Math.round(60000000 / bpm);
      track = track.concat(writeVarLength(0));
      track.push(0xFF, 0x51, 0x03);
      track.push((microsecondsPerBeat >> 16) & 0xFF);
      track.push((microsecondsPerBeat >> 8) & 0xFF);
      track.push(microsecondsPerBeat & 0xFF);

      // Program change: Electric Piano 1
      track = track.concat(writeVarLength(0));
      track.push(0xC0, 0x04);

      chords.forEach(function(chordName) {
        const notes = getChordMidiNotes(chordName);

        // Note on for all notes in the chord
        notes.forEach(function(note, noteIndex) {
          track = track.concat(writeVarLength(noteIndex === 0 ? 0 : 0));
          track.push(0x90, note, 80);
        });

        // Note off for all notes in the chord
        notes.forEach(function(note, noteIndex) {
          track = track.concat(writeVarLength(noteIndex === 0 ? chordDurationTicks : 0));
          track.push(0x80, note, 0);
        });
      });

      // End of track
      track = track.concat(writeVarLength(0));
      track.push(0xFF, 0x2F, 0x00);

      const header = [
        0x4D, 0x54, 0x68, 0x64,
        0x00, 0x00, 0x00, 0x06,
        0x00, 0x00,
        0x00, 0x01,
        (ticksPerBeat >> 8) & 0xFF,
        ticksPerBeat & 0xFF
      ];

      const trackHeader = [
        0x4D, 0x54, 0x72, 0x6B,
        (track.length >> 24) & 0xFF,
        (track.length >> 16) & 0xFF,
        (track.length >> 8) & 0xFF,
        track.length & 0xFF
      ];

      return header.concat(trackHeader).concat(track);
    }

    function writeVarLength(value) {
      let buffer = value & 0x7F;
      let bytes = [];

      while ((value >>= 7)) {
        buffer <<= 8;
        buffer |= ((value & 0x7F) | 0x80);
      }

      while (true) {
        bytes.push(buffer & 0xFF);

        if (buffer & 0x80) {
          buffer >>= 8;
        } else {
          break;
        }
      }

      return bytes;
    }

    loadKeys();
    showChords();
  </script>

</body>
</html>
