<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Chord Wheel</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .card {
      background: #222;
      max-width: 500px;
      margin: auto;
      padding: 25px;
      border-radius: 20px;
    }

    select, button {
      font-size: 18px;
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: white;
      color: black;
      cursor: pointer;
    }

    .box {
      background: #333;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>My Chord Wheel</h1>
    <p>Choose a key to see the chords.</p>

    <select id="keyPicker">
      <option value="C">C Major</option>
      <option value="G">G Major</option>
      <option value="D">D Major</option>
      <option value="A">A Major</option>
      <option value="F">F Major</option>
    </select>

    <br>

    <button onclick="showChords()">Show Chords</button>

    <div class="box">
      <h2 id="keyTitle">C Major</h2>
      <p id="chordOutput">C – Dm – Em – F – G – Am – Bdim</p>
      <h3>R&B Progression</h3>
      <p id="progressionOutput">Am – F – C – G</p>
    </div>
  </div>

  <script>
    const keys = {
      "C": ["C", "Dm", "Em", "F", "G", "Am", "Bdim"],
      "G": ["G", "Am", "Bm", "C", "D", "Em", "F#dim"],
      "D": ["D", "Em", "F#m", "G", "A", "Bm", "C#dim"],
      "A": ["A", "Bm", "C#m", "D", "E", "F#m", "G#dim"],
      "F": ["F", "Gm", "Am", "Bb", "C", "Dm", "Edim"]
    };

    function showChords() {
      const selectedKey = document.getElementById("keyPicker").value;
      const chords = keys[selectedKey];

      document.getElementById("keyTitle").textContent = selectedKey + " Major";
      document.getElementById("chordOutput").textContent = chords.join(" – ");

      const progression = [
        chords[5],
        chords[3],
        chords[0],
        chords[4]
      ];

      document.getElementById("progressionOutput").textContent = progression.join(" – ");
    }
  </script>

</body>
</html>
